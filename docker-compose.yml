name: algoverse

services:
  postgres:
    image: postgres:16-alpine
    container_name: algoverse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-algoverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algoverse}
      POSTGRES_DB: ${POSTGRES_DB:-algoverse}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - algoverse-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-algoverse}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: algoverse-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-algoverse}:${POSTGRES_PASSWORD:-algoverse}@postgres:5432/${POSTGRES_DB:-algoverse}?schema=public
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - '${API_PORT:-4000}:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: algoverse-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    ports:
      - '${WEB_PORT:-3000}:3000'

volumes:
  algoverse-postgres-data:
